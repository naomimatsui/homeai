<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>HomeAI — 探し物ゼロの家へ</title>
<style>
  :root{
    --bg:#f5f5f7; --card:#ffffff; --ink:#1d1d1f; --sub:#6e6e73;
    --accent:#1d4e89; --accent-soft:#e9f0f8; --warn:#c2410c; --line:#e5e5ea;
    --shadow:0 1px 3px rgba(0,0,0,.06);
  }
  @media (prefers-color-scheme: dark){
    :root{ --bg:#000000; --card:#1c1c1e; --ink:#f5f5f7; --sub:#98989d;
      --accent:#6ba7e0; --accent-soft:#16283d; --warn:#f59e6b; --line:#2c2c2e; --shadow:0 1px 3px rgba(0,0,0,.4);}
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  body{margin:0;
    font-family:-apple-system,BlinkMacSystemFont,"SF Pro Text","Hiragino Sans","Hiragino Kaku Gothic ProN","Yu Gothic",system-ui,sans-serif;
    background:var(--bg);color:var(--ink);line-height:1.55;padding-bottom:44px;-webkit-font-smoothing:antialiased;}
  header{padding:20px 18px 8px;text-align:center;}
  header .logomark{max-width:220px;width:62%;height:auto;display:inline-block;}
  header .logo{font-size:24px;font-weight:600;letter-spacing:-.022em;}
  header .tag{color:var(--sub);font-size:13px;margin-top:2px;}
  .tabs{position:sticky;top:0;z-index:5;display:flex;gap:6px;background:var(--bg);padding:8px 16px 10px;max-width:520px;margin:0 auto;}
  .tabs button{flex:1;padding:11px;border:1px solid var(--line);background:var(--card);border-radius:12px;font-size:14px;font-weight:600;color:var(--sub);cursor:pointer;}
  .tabs button.active{background:var(--accent);color:#fff;border-color:var(--accent);}
  .wrap{max-width:520px;margin:0 auto;padding:0 16px;}
  .card{background:var(--card);border:1px solid var(--line);border-radius:18px;box-shadow:var(--shadow);padding:18px;margin-bottom:16px;}
  label{font-size:12px;color:var(--sub);display:block;margin-bottom:5px;letter-spacing:-.01em;}
  input[type=text],input[type=number]{width:100%;padding:13px 15px;font-size:16px;border:1px solid var(--line);
    border-radius:12px;background:var(--bg);color:var(--ink);outline:none;transition:border-color .15s;}
  input:focus{border-color:var(--accent);}
  .row{margin-bottom:12px;}
  .inline{display:flex;gap:8px;align-items:stretch;}
  .inline input{flex:1;}
  .mic{border:1px solid var(--line);background:var(--bg);border-radius:12px;width:52px;font-size:20px;cursor:pointer;color:var(--ink);}
  .mic.on{background:var(--accent);border-color:var(--accent);}
  .rooms{display:flex;flex-wrap:wrap;gap:8px;}
  .chip{display:inline-flex;align-items:center;gap:6px;background:var(--accent-soft);color:var(--accent);
    border:none;border-radius:20px;padding:8px 13px;font-size:13px;font-weight:600;cursor:pointer;}
  .chip .x{opacity:.5;font-weight:400;font-size:14px;}
  .roomadd{display:flex;gap:8px;margin-top:11px;}
  .roomadd input{flex:1;}
  .roombtn{border:none;background:var(--accent);color:#fff;border-radius:11px;padding:0 18px;font-size:20px;font-weight:600;cursor:pointer;}
  .tools{display:flex;align-items:center;gap:10px;margin-bottom:12px;flex-wrap:wrap;}
  .qty{width:92px;flex:none;}
  .photobtn{display:inline-flex;align-items:center;gap:6px;font-size:14px;color:var(--accent);
    border:1px solid var(--accent);background:transparent;border-radius:10px;padding:10px 13px;cursor:pointer;margin:0;}
  .preview{position:relative;}
  .preview img{width:48px;height:48px;object-fit:cover;border-radius:9px;border:1px solid var(--line);display:block;}
  .preview button{position:absolute;top:-7px;right:-7px;width:20px;height:20px;border-radius:50%;
    border:none;background:var(--ink);color:var(--bg);font-size:13px;line-height:1;cursor:pointer;}
  .opt{display:flex;align-items:center;gap:8px;font-size:13px;color:var(--sub);margin:2px 0 10px;}
  .opt input{width:18px;height:18px;accent-color:var(--accent);}
  button.add{width:100%;padding:14px;font-size:16px;font-weight:600;letter-spacing:-.01em;color:#fff;
    background:var(--accent);border:none;border-radius:12px;cursor:pointer;transition:opacity .15s;margin-top:4px;}
  button.add:active{opacity:.85;}
  .savednote{font-size:12.5px;color:var(--sub);text-align:center;margin-top:11px;}
  .savednote b{color:var(--accent);}
  .count{font-size:13px;color:var(--sub);text-align:center;margin:2px 0 4px;}
  .count b{color:var(--accent);font-weight:600;}
  .stat{text-align:center;font-size:13px;color:var(--accent);font-weight:600;margin:0 0 12px;}
  .search{position:relative;margin-bottom:12px;}
  .search input{padding-left:38px;}
  .search .ico{position:absolute;left:13px;top:50%;transform:translateY(-50%);font-size:15px;opacity:.5;}
  .fchips{display:flex;flex-wrap:wrap;gap:7px;margin-bottom:14px;}
  .fchip{background:var(--card);border:1px solid var(--line);color:var(--ink);border-radius:18px;padding:7px 13px;font-size:13px;cursor:pointer;}
  .fchip.on{background:var(--accent);color:#fff;border-color:var(--accent);}
  .taphint{font-size:11.5px;color:var(--sub);text-align:center;margin:-2px 0 12px;opacity:.8;}
  .searchrow{display:flex;gap:8px;margin-bottom:12px;}
  .searchrow .search{flex:1;margin-bottom:0;}
  .group{margin-bottom:22px;}
  .roomhead{font-size:16px;font-weight:700;color:var(--ink);margin:0 2px 9px;letter-spacing:-.02em;padding-bottom:6px;border-bottom:1px solid var(--line);}
  .roomhead span{color:var(--sub);font-weight:500;font-size:13px;margin-left:6px;}
  .subhead{font-size:12.5px;font-weight:600;color:var(--accent);margin:8px 2px 6px 4px;}
  .group ul{margin:0 0 4px 6px;}
  ul{list-style:none;margin:0;padding:0;}
  li{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:11px 13px;
    margin-bottom:8px;display:flex;align-items:center;gap:11px;box-shadow:var(--shadow);cursor:pointer;transition:background .1s;}
  li:active{background:var(--accent-soft);}
  li .thumb{width:46px;height:46px;object-fit:cover;border-radius:9px;border:1px solid var(--line);flex:none;}
  li .name{font-weight:600;font-size:15px;letter-spacing:-.01em;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
  li .name .qtybadge{color:var(--sub);font-weight:500;font-size:13px;margin-left:6px;}
  li .body{flex:1;min-width:0;}
  li .del{border:none;background:transparent;color:var(--sub);font-size:16px;cursor:pointer;padding:6px 8px;border-radius:8px;opacity:.6;flex:none;}
  .empty{text-align:center;color:var(--sub);font-size:14px;padding:30px 12px;line-height:1.7;}
  .empty .big{font-size:32px;}
  .hi{color:var(--accent);}
  .toast{position:fixed;left:50%;bottom:26px;transform:translateX(-50%) translateY(20px);
    background:var(--ink);color:var(--bg);padding:11px 20px;border-radius:30px;font-size:14px;font-weight:500;
    opacity:0;pointer-events:none;transition:.25s;white-space:nowrap;z-index:9;max-width:90%;}
  .toast.show{opacity:1;transform:translateX(-50%) translateY(0);}
  .toast.warn{background:var(--warn);}
  .hint{font-size:12px;color:var(--sub);margin-top:9px;text-align:center;}
</style>
</head>
<body>
  <header>
    <img class="logomark" src="logo.png" alt="HomeAI"
         onerror="this.remove();document.getElementById('logofb').style.display='block';">
    <div id="logofb" style="display:none"><div class="logo">HomeAI</div><div class="tag">探し物ゼロの家へ</div></div>
  </header>

  <nav class="tabs">
    <button id="tabRegist" class="active">➕ 登録</button>
    <button id="tabBrowse">📋 一覧・さがす</button>
  </nav>

  <div class="wrap">
    <!-- ===== 登録ビュー ===== -->
    <div id="viewRegist">
      <div class="card">
        <label>🏠 部屋（タップで「場所」に入る。トイレが2つなら2回登録→トイレ・トイレ2）</label>
        <div class="rooms" id="rooms"></div>
        <div class="roomadd">
          <input type="text" id="roomName" placeholder="部屋を追加（例：リビング）">
          <button class="roombtn" id="roomBtn" aria-label="部屋を追加">＋</button>
        </div>
      </div>

      <div class="card">
        <div class="row">
          <label>なにを？（品名）</label>
          <div class="inline">
            <input type="text" id="name" placeholder="例：ワンピース">
            <button class="mic" id="voiceBtn" title="音声で入力" aria-label="音声で入力">🎙</button>
          </div>
        </div>
        <div class="row">
          <label>どこに？（部屋をタップ or 手入力）</label>
          <input type="text" id="place" placeholder="例：リビング / クローゼット1">
        </div>
        <div class="tools">
          <input class="qty" type="number" id="qty" min="1" placeholder="個数" inputmode="numeric">
          <label class="photobtn">📷 写真（撮る/選ぶ）
            <input type="file" id="photo" accept="image/*" hidden>
          </label>
          <div class="preview" id="preview"></div>
        </div>
        <label class="opt"><input type="checkbox" id="autonum" checked>番号を自動でつける（ワンピース1・2…）</label>
        <label class="opt"><input type="checkbox" id="samePlace">同じ場所で続けて登録（クローゼット一気に）</label>
        <button class="add" id="addBtn">＋ 登録する</button>
        <div class="savednote" id="savednote"></div>
      </div>
    </div>

    <!-- ===== 一覧・さがすビュー ===== -->
    <div id="viewBrowse" hidden>
      <div class="searchrow">
        <div class="search">
          <span class="ico">🔍</span>
          <input type="text" id="search" placeholder="さがす（品名・場所）">
        </div>
        <button class="mic" id="voiceSearchBtn" title="音声でさがす" aria-label="音声でさがす">🎙</button>
      </div>
      <button class="add" id="voiceAddBtn" style="margin:0 0 14px">🎙 声で追加（「品名、場所」と言ってな）</button>
      <div class="fchips" id="fchips"></div>
      <div class="count" id="count"></div>
      <div class="stat" id="stat"></div>
      <div class="taphint" id="taphint"></div>
      <div id="list"></div>
    </div>
  </div>

  <div class="toast" id="toast"></div>

<script>
(function(){
  const KEY='homeai_items_v1', SKEY='homeai_stats_v1', RKEY='homeai_rooms_v1';
  const MIN_PER_FIND=5, BUY_WARN=5;
  let items = JSON.parse(localStorage.getItem(KEY) || '[]');
  let stats = JSON.parse(localStorage.getItem(SKEY) || '{"found":0,"minutes":0}');
  let rooms = JSON.parse(localStorage.getItem(RKEY) || 'null');
  let pendingPhoto='', activeRoom=null;

  const $ = id => document.getElementById(id);
  const nameEl=$('name'), placeEl=$('place'), qtyEl=$('qty'), autonumEl=$('autonum'), samePlaceEl=$('samePlace'),
        photoEl=$('photo'), previewEl=$('preview'), voiceBtn=$('voiceBtn'),
        roomsEl=$('rooms'), roomNameEl=$('roomName'), roomBtn=$('roomBtn'), savednoteEl=$('savednote'),
        listEl=$('list'), countEl=$('count'), statEl=$('stat'), taphintEl=$('taphint'), fchipsEl=$('fchips'),
        searchEl=$('search'), voiceSearchBtn=$('voiceSearchBtn'), voiceAddBtn=$('voiceAddBtn'), toastEl=$('toast'),
        tabRegist=$('tabRegist'), tabBrowse=$('tabBrowse'), viewRegist=$('viewRegist'), viewBrowse=$('viewBrowse');

  const cheers=['ええやん！','1個、探し物ゼロに近づいた✨','その調子や😊','登録completed！','コツコツ最強や👏'];
  if(rooms===null){ rooms=['リビング','キッチン','寝室','トイレ','洗面所','玄関']; saveRooms(); }

  function save(){ try{ localStorage.setItem(KEY, JSON.stringify(items)); }catch(e){ toast('保存容量いっぱいかも。写真は少なめにな🙏'); } }
  function saveStats(){ localStorage.setItem(SKEY, JSON.stringify(stats)); }
  function saveRooms(){ localStorage.setItem(RKEY, JSON.stringify(rooms)); }
  function baseName(s){ return s.replace(/\s*\d+\s*$/,'').trim(); }
  function nextNumber(base){ let m=0; items.forEach(it=>{ if(baseName(it.name)===base){ const x=it.name.match(/(\d+)\s*$/); const n=x?parseInt(x[1],10):0; if(n>m)m=n; } }); return m+1; }
  function totalQty(base){ return items.filter(it=>baseName(it.name)===base).reduce((s,it)=>s+(it.qty||1),0); }
  function fmtMin(m){ if(m<60) return `約${m}分`; const h=Math.floor(m/60), mm=m%60; return `約${h}時間${mm?mm+'分':''}`; }
  function uniqueRoom(name){ if(!rooms.includes(name)) return name; let n=2; while(rooms.includes(name+n)) n++; return name+n; }
  function toast(msg,warn){ toastEl.textContent=msg; toastEl.className='toast show'+(warn?' warn':''); clearTimeout(toast._t); toast._t=setTimeout(()=>toastEl.classList.remove('show'),2000); }
  function esc(s){ return (s||'').replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c])); }

  /* ---- タブ ---- */
  function showView(v){
    const b = v==='browse';
    viewRegist.hidden=b; viewBrowse.hidden=!b;
    tabRegist.classList.toggle('active',!b); tabBrowse.classList.toggle('active',b);
    if(b) renderBrowse();
  }
  tabRegist.addEventListener('click',()=>showView('regist'));
  tabBrowse.addEventListener('click',()=>showView('browse'));

  /* ---- 部屋 ---- */
  function renderRooms(){
    roomsEl.innerHTML = rooms.length
      ? rooms.map((r,i)=>`<button class="chip" data-i="${i}">${esc(r)}<span class="x" data-del="${i}">×</span></button>`).join('')
      : '<span style="color:var(--sub);font-size:13px">部屋がまだないで。下で追加してな</span>';
  }
  function addRoom(){ let n=roomNameEl.value.trim(); if(!n){ roomNameEl.focus(); return; } rooms.push(uniqueRoom(n)); saveRooms(); roomNameEl.value=''; renderRooms(); toast('部屋を追加したで🏠'); }
  roomsEl.addEventListener('click', e=>{
    if(e.target.dataset.del!==undefined){ rooms.splice(+e.target.dataset.del,1); saveRooms(); renderRooms(); return; }
    const chip=e.target.closest('.chip'); if(!chip) return;
    placeEl.value=rooms[+chip.dataset.i]+' / '; placeEl.focus(); placeEl.setSelectionRange(placeEl.value.length,placeEl.value.length);
  });
  roomBtn.addEventListener('click', addRoom);
  roomNameEl.addEventListener('keydown', e=>{ if(e.key==='Enter') addRoom(); });

  /* ---- 写真（撮る/選ぶ両対応・captureなし） ---- */
  function handlePhoto(file){
    const reader=new FileReader();
    reader.onload=()=>{ const img=new Image();
      img.onload=()=>{ const max=1000; let w=img.width,h=img.height;
        if(w>h&&w>max){h=Math.round(h*max/w);w=max;} else if(h>max){w=Math.round(w*max/h);h=max;}
        const c=document.createElement('canvas');c.width=w;c.height=h;c.getContext('2d').drawImage(img,0,0,w,h);
        pendingPhoto=c.toDataURL('image/jpeg',0.7);
        previewEl.innerHTML=`<img src="${pendingPhoto}" alt=""><button type="button" id="rmPhoto" aria-label="写真を外す">×</button>`;
        $('rmPhoto').onclick=()=>{ pendingPhoto=''; previewEl.innerHTML=''; photoEl.value=''; };
      }; img.src=reader.result; };
    reader.readAsDataURL(file);
  }
  photoEl.addEventListener('change', e=>{ if(e.target.files[0]) handlePhoto(e.target.files[0]); });

  /* ---- 音声 ---- */
  const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
  voiceBtn.addEventListener('click', ()=>{
    if(!SR){ toast('この端末は音声入力に未対応みたい🙏 手入力でな'); return; }
    const rec=new SR(); rec.lang='ja-JP'; rec.interimResults=false; rec.maxAlternatives=1;
    voiceBtn.classList.add('on'); toast('話してな…🎙（例：ワンピース、リビングのクローゼット1）');
    rec.onresult=e=>{ let t=e.results[0][0].transcript.trim().replace(/(を)?追加(して)?$/,'').replace(/。$/,'').trim();
      const p=t.split(/[、,，]/);
      if(p.length>=2){ nameEl.value=p[0].trim(); placeEl.value=p.slice(1).join(' ').trim(); } else nameEl.value=t;
      toast('聞き取ったで。確認して「登録する」押してな😊'); };
    rec.onerror=()=>toast('うまく聞き取れんかった。もう一回試してな');
    rec.onend=()=>voiceBtn.classList.remove('on');
    rec.start();
  });

  /* ---- 登録 ---- */
  function updateSavedNote(){ savednoteEl.innerHTML = items.length ? `いま <b>${items.length}</b>件 登録済み → 「一覧・さがす」タブで見れるで` : 'まだ0件。1個登録してみよ😊'; }
  function add(){
    let name=nameEl.value.trim(); const place=placeEl.value.trim();
    const qty=Math.max(1, parseInt(qtyEl.value,10)||1);
    if(!name){ toast('なにを登録する？品名を入れてな'); nameEl.focus(); return; }
    const base=baseName(name);
    if(autonumEl.checked){ name = base + nextNumber(base); }
    const totalAfter = totalQty(base)+qty;
    items.push({id:Date.now()+''+Math.floor(Math.random()*999), name, place, qty, photo:pendingPhoto, created:Date.now()});
    save();
    nameEl.value=''; qtyEl.value='';
    if(!samePlaceEl.checked) placeEl.value='';
    pendingPhoto=''; previewEl.innerHTML=''; photoEl.value=''; nameEl.focus();
    updateSavedNote();
    if(totalAfter>=BUY_WARN) toast(`⚠️ ${base}、合計${totalAfter}個！買いすぎ注意やで😂`, true);
    else toast(cheers[Math.floor(Math.random()*cheers.length)]);
  }
  $('addBtn').addEventListener('click', add);
  placeEl.addEventListener('keydown', e=>{ if(e.key==='Enter') add(); });
  nameEl.addEventListener('keydown', e=>{ if(e.key==='Enter') placeEl.focus(); });

  /* ---- 一覧・さがす（部屋フィルタ＋場所別グループ） ---- */
  function renderFchips(){
    fchipsEl.innerHTML = `<button class="fchip ${activeRoom===null?'on':''}" data-room="__all">すべて</button>` +
      rooms.map(r=>`<button class="fchip ${activeRoom===r?'on':''}" data-room="${esc(r)}">${esc(r)}</button>`).join('');
  }
  fchipsEl.addEventListener('click', e=>{
    const b=e.target.closest('.fchip'); if(!b) return;
    activeRoom = b.dataset.room==='__all' ? null : b.dataset.room;
    renderBrowse();
  });
  function itemRow(it){
    return `<li data-id="${it.id}">
      ${it.photo?`<img class="thumb" src="${it.photo}" alt="">`:''}
      <div class="body"><div class="name">${esc(it.name)}${(it.qty&&it.qty>1)?`<span class="qtybadge">×${it.qty}</span>`:''}</div></div>
      <button class="del" data-id="${it.id}" aria-label="削除">🗑️</button>
    </li>`;
  }
  function renderBrowse(){
    renderFchips();
    countEl.innerHTML = items.length ? `<b>${items.length}</b>件 登録済み` : '';
    statEl.innerHTML = stats.found>0 ? `⏱ ${stats.found}回 探さず発見・${fmtMin(stats.minutes)}を節約✨` : '';
    taphintEl.textContent = items.length ? '見つけたモノをタップ→⏱ 節約時間がたまるで' : '';
    const q=searchEl.value.trim().toLowerCase();
    let shown=items.filter(it=>{
      if(q && !((it.name+' '+it.place).toLowerCase().includes(q))) return false;
      if(activeRoom && !((it.place||'').includes(activeRoom))) return false;
      return true;
    });
    if(!items.length){ listEl.innerHTML=`<div class="empty"><div class="big">📦</div>まだ何もないで。<br>「➕登録」タブから追加してな😊</div>`; return; }
    if(!shown.length){ listEl.innerHTML=`<div class="empty">条件に合うモノが無かった🤔<br>検索や部屋フィルタを変えてみて</div>`; return; }
    // 2階層グループ：部屋（大枠）→ その中の場所（テレビ台/引出 など）
    const rmap={};
    shown.forEach(it=>{
      const parts=(it.place||'').split('/').map(s=>s.trim()).filter(Boolean);
      const room = parts.length?parts[0]:'（場所未記入）';
      const sub = parts.slice(1).join(' / ');
      rmap[room]=rmap[room]||{};
      (rmap[room][sub]=rmap[room][sub]||[]).push(it);
    });
    listEl.innerHTML = Object.keys(rmap).sort().map(room=>{
      const subs=rmap[room];
      const total=Object.values(subs).reduce((s,a)=>s+a.length,0);
      const inner=Object.keys(subs).sort().map(sub=>{
        const rows=`<ul>${subs[sub].map(itemRow).join('')}</ul>`;
        return sub ? `<div class="subhead">📍 ${esc(sub)}</div>${rows}` : rows;
      }).join('');
      return `<div class="group"><div class="roomhead">🏠 ${esc(room)}<span>(${total})</span></div>${inner}</div>`;
    }).join('');
  }
  searchEl.addEventListener('input', renderBrowse);
  /* 音声で呼び出し（聞く→場所を声で答える） */
  voiceSearchBtn.addEventListener('click', ()=>{
    if(!SR){ toast('この端末は音声に未対応みたい🙏'); return; }
    const rec=new SR(); rec.lang='ja-JP'; rec.interimResults=false; rec.maxAlternatives=1;
    voiceSearchBtn.classList.add('on'); toast('聞くで…🎙（例：パスポート どこ？）');
    rec.onresult=e=>{
      let t=e.results[0][0].transcript.trim()
        .replace(/はどこ.*$/,'').replace(/どこ.*$/,'').replace(/を?探して.*$/,'').replace(/教えて.*$/,'')
        .replace(/[。？?、]/g,'').trim();
      searchEl.value=t; activeRoom=null; renderBrowse();
      const q=t.toLowerCase();
      const hit=items.find(it=>(it.name+' '+it.place).toLowerCase().includes(q));
      if(hit){
        const msg = hit.place ? `${hit.name}は、${hit.place}にあるで` : `${hit.name}は登録されてるけど、場所が未記入や`;
        toast(`${hit.name} → ${hit.place||'場所未記入'}`);
        if('speechSynthesis' in window){ const u=new SpeechSynthesisUtterance(msg); u.lang='ja-JP'; speechSynthesis.cancel(); speechSynthesis.speak(u); }
      } else { toast(`「${t}」は見つからんかった🤔`); }
    };
    rec.onerror=()=>toast('うまく聞き取れんかった。もう一回');
    rec.onend=()=>voiceSearchBtn.classList.remove('on');
    rec.start();
  });
  /* さがす画面から声で登録 */
  voiceAddBtn.addEventListener('click', ()=>{
    if(!SR){ toast('この端末は音声に未対応みたい🙏'); return; }
    const rec=new SR(); rec.lang='ja-JP'; rec.interimResults=false; rec.maxAlternatives=1;
    toast('話してな…🎙（例：ワンピース、リビングのクローゼット1）');
    rec.onresult=e=>{
      let t=e.results[0][0].transcript.trim().replace(/(を)?追加(して)?$/,'').replace(/。$/,'').trim();
      const p=t.split(/[、,，]/);
      let nm=(p[0]||'').trim(), pl=p.slice(1).join(' ').trim();
      if(!nm){ toast('品名が聞き取れんかった。もう一回'); return; }
      const base=baseName(nm);
      if(autonumEl.checked) nm=base+nextNumber(base);
      items.push({id:Date.now()+''+Math.floor(Math.random()*999), name:nm, place:pl, qty:1, photo:'', created:Date.now()});
      save(); renderBrowse(); updateSavedNote();
      toast(`「${nm}」を ${pl||'（場所未記入）'} に登録したで✨`);
    };
    rec.onerror=()=>toast('うまく聞き取れんかった。もう一回');
    rec.start();
  });
  listEl.addEventListener('click', e=>{
    const del=e.target.closest('.del');
    if(del){ items=items.filter(it=>it.id!==del.dataset.id); save(); renderBrowse(); updateSavedNote(); return; }
    const li=e.target.closest('li'); if(!li||!li.dataset.id) return;
    stats.found++; stats.minutes+=MIN_PER_FIND; saveStats();
    statEl.innerHTML=`⏱ ${stats.found}回 探さず発見・${fmtMin(stats.minutes)}を節約✨`;
    toast(`見つけた！⏱ 約${MIN_PER_FIND}分の節約（累計${stats.found}回）✨`);
  });

  renderRooms(); updateSavedNote(); showView('regist');
})();
</script>
</body>
</html>
